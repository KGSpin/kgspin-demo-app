# KGSpin Benchmark 10-K Corpus — manifest v0
#
# Freeze of the 10-K corpus both arms build graphs over. Aligned with the
# FinanceBench multi-hop subset so committed questions have answerable
# evidence in-corpus. Selection criteria:
#
#   * 10-20 companies (this manifest: 15)
#   * Mixed GICS sectors — 7 represented below
#   * Multi-year slices where available (5 companies have 2 years)
#   * No sector bias toward any target partner (CEO direction, sprint 20 scope)
#   * Each doc also appears in FinanceBench's `multi-hop` subset (>=2 evidence spans),
#     so Arm A + Arm B retrieval can be scored on real, gold-labelled questions.
#
# `sha256` is the hash of the PDF bytes served at the listed URL as of
# 2026-04-20. A null value means the fetch attempt was rate-limited or
# behind an auth redirect during manifest freeze; the fetch script
# (`benchmarks/corpus/fetch.py`) populates these on first successful
# download and persists to `manifest.lock.yaml` (gitignored). Any
# downstream run MUST verify content against manifest sha256 before
# building the graph — otherwise Arm A / Arm B aren't scoring the same
# inputs.
#
# SHA values here were measured against the URLs above; they are NOT
# FinanceBench's own hashes. If a URL is replaced upstream, the
# fetch script surfaces the mismatch and refuses to continue.

