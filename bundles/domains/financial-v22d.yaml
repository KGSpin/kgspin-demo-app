        - talc
      GOVERNMENT_AGENCY:
        semantic_definition: A named governmental body with regulatory, enforcement,
          or supervisory authority over industries or entities.
        spacy_ner_map:
          ORG: 0.3
        positive_examples:
        - The Securities and Exchange Commission oversees public companies.
        - The SEC requires companies to file annual reports.
        - A government agency enforces financial regulations.
        - The Environmental Protection Agency sets pollution standards.
        negative_examples:
