# ---------------------------------------------------------------------------
# ADR-029 (Sprint 12) — Unified Pipeline Orchestration
#
# This block is the worked example for the new schema: every field
# below is documented inline so a non-engineer domain operator can copy
# this YAML into a new vertical (legal-v01.yaml, medical-v01.yaml, etc.)
# and tune the pipeline by editing values rather than PR'ing kgspin-core.
#
# All fields are OPTIONAL. If the entire `orchestration:` block is
# absent, the strategy modules fall back to their pre-Sprint-12
# hardcoded defaults. The values below match the pre-Sprint-12
# defaults verbatim, so the JNJ baseline stays byte-identical when this
# block is added (regression-tested in tests/test_compile_parity.py).
# ---------------------------------------------------------------------------
orchestration:

  # `strategy:` — overrides the bundle's top-level `execution_strategy`.
  # Use this when a single domain bundle needs to ship with multiple
  # pipeline overlays (e.g. one .bundles dir compiled for fan_out, one
  # for agentic_analyst). Leave blank to inherit `execution_strategy`.
  strategy: ""

  # `model_mapping:` — tells the LLM-backed strategies which model to
  # use for which phase. Currently only the top-level `primary` is
  # consumed; `reasoner` is reserved for ADR-027 (SLM hybrid). Add
  # vendor-specific keys for vertical-specific model selection.
  #
  # Read by: agentic_flash, agentic_analyst, discovery_agentic
  model_mapping:
    primary: gemini-2.5-flash       # cheap, fast, 1M-token context
    # reasoner: gemini-1.5-pro      # uncomment when ADR-027 lands

  # `chunking:` — macro-chunk parameters for the LLM-backed strategies.
  # The aligned_extractor (agentic_analyst) and gemini_full_shot
  # (agentic_flash) both call `_macro_chunk(text, max_chars, overlap)`
  # to split JNJ-scale documents into LLM-sized payloads.
  #
  # `max_chars`: the max characters per chunk. JNJ 10-K is ~440K chars
  #   stripped; max_chars=80000 yields ~6-7 chunks for agentic_flash
  #   (comfortable margin under Gemini's ~65K output token ceiling).
  #   Bump to 160000 if you have a long-context model, drop to 20000
  #   if you're paying per chunk.
  # `overlap`: the fraction of the previous chunk to repeat at the
  #   start of the next chunk. 0.10 = 10% overlap. Higher overlap
  #   improves boundary-entity recall but costs more tokens.
  # `method`: chunker variant. Only `macro_chunk` is implemented in
  #   Sprint 12. Sprint 13 may add `sliding_window` or `section_aware`.
  #
  # Read by: agentic_flash, agentic_analyst
  chunking:
    method: macro_chunk
    max_chars: 80000
    overlap: 0.10

  # `prompts:` — LLM prompt templates with `{placeholder}` interpolation.
  # When a template is set here it OVERRIDES the strategy module's
  # hardcoded prompt. When absent the strategy uses its built-in default.
  #
  # Required placeholders by strategy (validated at compile time —
  # missing placeholders raise ValueError):
  #   agentic_flash.system_template:
  #     {entity_block}, {rel_block}, {main_entity}, {valid_predicates}
  #   agentic_analyst.system_template:
  #     {entity_block}, {rel_block}, {main_entity}, {valid_predicates}
  #   agentic_analyst.chunk_template:
  #     {text}, {entity_map}
  #
  # The example below is left empty (commented out) so the v22d bundle
  # uses its built-in defaults. Uncomment + customize to override.
  prompts: {}
  #   system_template: |
  #     You are a {main_entity} domain analyst. Extract entities and
  #     relationships from the provided text. Use only these entity
  #     types: {entity_block}. Use only these relationship types:
  #     {rel_block}. Valid predicates: {valid_predicates}.
  #   chunk_template: |
  #     Current entity map: {entity_map}
  #     Text: {text}
