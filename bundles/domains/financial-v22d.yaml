      FINANCIAL_EXCHANGE:
        semantic_definition: A named organization that provides a marketplace for
          the trading of securities, commodities, or other financial instruments.
        spacy_ner_map:
          ORG: 0.3
        positive_examples:
        - The Nasdaq Stock Market LLC is a major stock exchange.
        - Securities are registered on The Nasdaq Stock Market LLC.
        - The New York Stock Exchange is located in Wall Street.
        - Investors trade stocks on a financial exchange.
