types:
  ORG:
    semantic_definition: Companies, agencies, institutions, and other organizations.
    subtypes:
      COMPANY:
        semantic_definition: A named business entity, including publicly traded corporations,
          private companies, and their significant operating subsidiaries or divisions.
        spacy_ner_map:
          ORG: 0.3
        positive_examples:
        - Apple Inc. is a well-known technology company.
        - The Registrant filed its annual report on Form 10-K.
        - Each of the terms the 'Company' and 'Apple' refers to Apple Inc.
        - A publicly traded corporation must file with the SEC.
        - The firm designs, manufactures, and markets smartphones.
        - Global Tech Solutions is a leading software company.
        negative_examples:
        - The company's common stock is traded on Nasdaq.
        - The company's CEO announced new initiatives.
        - The company's product line includes the iPhone.
        keywords:
        - company
        - corporation
        - firm
        - registrant
        - enterprise
        - inc
        - Inc.
        - group
        - competitor
        - incorporation
        - Corp.
        - brand
        - organization
